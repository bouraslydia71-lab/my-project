<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarcelonaStay Pixel Perfect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif}
</style>
</head>

<body class="bg-[#f5f7fb] text-gray-800">

<!-- HEADER -->
<header class="bg-white border-b px-8 py-4 flex justify-between items-center">
  <div class="text-blue-600 font-semibold text-lg">BarcelonaStay</div>
  <button class="bg-blue-600 text-white px-4 py-1.5 rounded-md text-sm">Login</button>
</header>

<!-- SEARCH BAR (BLUE) -->
<div class="bg-[#e9f1ff] px-8 py-6">
  <div class="bg-white rounded-xl shadow flex items-center overflow-hidden max-w-5xl mx-auto">
    <input class="flex-1 px-4 py-3 text-sm outline-none" placeholder="Barcelona, Spain">
    <input class="flex-1 px-4 py-3 text-sm outline-none border-l" placeholder="May 10 - May 15">
    <input class="flex-1 px-4 py-3 text-sm outline-none border-l" placeholder="2 Adults, 0 Children">
    <button class="bg-blue-600 text-white px-6 py-3 text-sm">Search</button>
  </div>
</div>

<!-- MAIN GRID -->
<div class="grid grid-cols-[260px_1fr_320px] gap-6 px-8 py-8">

<!-- SIDEBAR -->
<aside class="bg-white rounded-xl p-5 shadow-sm text-sm">
  <div class="flex justify-between mb-3">
    <h3 class="font-semibold">Filters</h3>
    <button class="text-blue-600 text-xs">Reset All</button>
  </div>

  <div class="mb-4">
    <p class="font-medium mb-2">Total budget (per night)</p>
    <input type="range" class="w-full">
  </div>

  <div class="mb-4">
    <p class="font-medium mb-2">Star rating</p>
    <div class="space-y-1">
      <label><input type="checkbox"> ★★★★★</label><br>
      <label><input type="checkbox"> ★★★★</label><br>
      <label><input type="checkbox"> ★★★</label>
    </div>
  </div>

  <div class="mb-4">
    <p class="font-medium mb-2">Amenities</p>
    <div class="space-y-1">
      <label><input type="checkbox"> Free WiFi</label><br>
      <label><input type="checkbox"> Parking</label><br>
      <label><input type="checkbox"> Pool</label>
    </div>
  </div>

  <div class="bg-blue-50 p-4 rounded-lg text-center mt-6">
    <p class="text-xs">Need help?</p>
    <button class="mt-2 bg-blue-600 text-white px-3 py-1 rounded text-sm">Contact</button>
  </div>
</aside>

<!-- LIST -->
<div>
  <div class="flex justify-between items-center mb-4">
    <h2 class="font-semibold">Barcelona: 6 properties found</h2>
    <select class="border px-3 py-1 text-sm rounded">
      <option>Sort by Price</option>
    </select>
  </div>

  <div class="space-y-4">

    <!-- CARD -->
    <div class="bg-white rounded-xl shadow-sm flex overflow-hidden">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85" class="w-56 h-36 object-cover">
      <div class="p-4 flex-1">
        <div class="flex justify-between items-start">
          <h3 class="font-semibold">W Barcelona</h3>
          <span class="text-gray-400">♡</span>
        </div>
        <p class="text-xs text-gray-500 mt-1">Beachfront · Barcelona</p>
        <div class="text-yellow-400 text-sm mt-1">★★★★★ 4.8 (320 reviews)</div>
        <div class="flex justify-between items-center mt-3">
          <span class="text-blue-600 font-semibold">€410</span>
          <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm">See deal</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm flex overflow-hidden">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945" class="w-56 h-36 object-cover">
      <div class="p-4 flex-1">
        <h3 class="font-semibold">Hotel Arts</h3>
        <p class="text-xs text-gray-500 mt-1">Luxury · Barcelona</p>
        <div class="text-yellow-400 text-sm mt-1">★★★★★ 4.7</div>
        <div class="flex justify-between mt-3">
          <span class="text-blue-600 font-semibold">€380</span>
          <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm">See deal</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm flex overflow-hidden">
      <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267" class="w-56 h-36 object-cover">
      <div class="p-4 flex-1">
        <h3 class="font-semibold">Minimalist Retreat</h3>
        <p class="text-xs text-gray-500 mt-1">Modern · Barcelona</p>
        <div class="text-yellow-400 text-sm mt-1">★★★★★ 4.6</div>
        <div class="flex justify-between mt-3">
          <span class="text-blue-600 font-semibold">€320</span>
          <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm">See deal</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MAP -->
<div>
  <div class="bg-white rounded-xl shadow-sm p-3">
    <img src="https://maps.googleapis.com/maps/api/staticmap?center=Barcelona&zoom=12&size=320x400" class="rounded-lg w-full">
  </div>
</div>

</div>

</body>
</html>
