<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voyage - Tourist Sign Up</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
    body { background: #f5f7fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; width: 450px; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
    .profile-upload { margin-bottom: 25px; cursor: pointer; display: inline-block; }
    #imagePreview { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; transition: 0.3s; }
    #imagePreview:hover { transform: scale(1.05); }
    input[type="file"] { display: none; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; }
    input:focus { border-color: #3b82f6; }
    .next { background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700; margin-top: 20px; transition: 0.3s; }
    .next:hover { background: #2563eb; }
    .back-link { display: block; margin-top: 15px; font-size: 13px; color: #666; text-decoration: none; }
</style>
</head>
<body>

<div class="card">
    <h2>Tourist Sign Up</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Join our global community</p>
    
    <label for="imageUpload" class="profile-upload">
        <img src="https://via.placeholder.com/110?text=Upload" id="imagePreview">
        <p style="color: #3b82f6; font-size: 12px; font-weight: 600; margin-top: 8px;">Click to Upload Photo</p>
    </label>
    <input type="file" id="imageUpload" accept="image/*">

    <input type="text" id="userName" placeholder="Full Name">
    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Create Password">
    
    <button class="next" id="createBtn">Create Account</button>
    <a href="role.html" class="back-link">Back to Selection</a>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const imagePreview = document.getElementById('imagePreview');

    // Preview image locally
    imageUpload.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            imagePreview.src = reader.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // Save to LocalStorage and Redirect
    document.getElementById('createBtn').addEventListener('click', function() {
        const photo = imagePreview.src;
        if(photo.includes('placeholder')) {
            alert("Please upload a profile picture first!");
            return;
        }
        
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userImage', photo);
        window.location.href = 'homepage2.html';
    });
</script>
</body>
</html>
