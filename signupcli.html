<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Pilot | Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at center, #ffffff 0%, #e0ebff 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.signup-card{
    background:#fff;
    width:100%;
    max-width:480px;
    padding:40px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    font-weight:700;
    font-size:22px;
    color:#1e73ff;
    margin-bottom:10px;
}

.header h2{
    font-size:24px;
    margin-bottom:5px;
}

.header p{
    color:#666;
    font-size:14px;
}

/* PROFILE IMAGE */
.profile-container{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.profile-circle{
    width:100px;
    height:100px;
    border-radius:50%;
    border:2px dashed #cbd5e1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    overflow:hidden;
    position:relative;
    transition:0.3s;
}

.profile-circle:hover{
    border-color:#1e73ff;
    background:#eef4ff;
}

.profile-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.profile-circle input{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}

.icon{
    font-size:24px;
    color:#94a3b8;
}

/* INPUTS */
.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #e2e8f0;
    border-radius:8px;
    font-size:14px;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#1e73ff;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:0.2s;
}

.btn:hover{
    background:#2563eb;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#64748b;
}

.footer a{
    color:#1e73ff;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="signup-card">

    <div class="header">
        <div class="logo">🌐 Trip Pilot</div>
        <h2>Create Your Account</h2>
        <p>Join 50,000+ digital nomads exploring the world.</p>
    </div>

    <!-- FORM -->
    <form action="signupcli.php" method="POST" enctype="multipart/form-data">

        <!-- PROFILE IMAGE -->
        <div class="profile-container">
            <div class="profile-circle">
                <span class="icon" id="icon">📸</span>
                <img id="preview">
                <input type="file" name="profile_pic" id="upload" accept="image/*" required>
            </div>
        </div>

        <div class="input-group">
            <input type="text" name="full_name" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-group">
            <input type="password" name="confirm" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn">Create My Account →</button>

    </form>

    <div class="footer">
        Already have an account? <a href="#">Login</a>
    </div>

</div>

<script>
const upload = document.getElementById('upload');
const preview = document.getElementById('preview');
const icon = document.getElementById('icon');

upload.addEventListener('change', function(){
    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
            icon.style.display = "none";
        }

        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
